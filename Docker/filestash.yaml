  services:
    filestash:
      container_name: filestash
      image: machines/filestash:latest
      restart: always
      user: 0:0
      environment:
      - PUID=${PUID}    # User ID
      - PGID=${PGID}    # Group ID
      - TZ=${TZ}        # TimeZone
      - UMASK=${UMASK}  # File Umask 
      - APPLICATION_URL=http://sfl-media-001.onling.com:8089 # Replace with your actual URL or IP
      - CANARY=true
      - OFFICE_URL=http://wopi_server:9980
      - OFFICE_FILESTASH_URL=http://filestash:8334
      - OFFICE_REWRITE_URL=http://127.0.0.1:9980
      logging:
        driver: json-file
        options:
          max-file: ${DOCKERLOGGING_MAXFILE}
          max-size: ${DOCKERLOGGING_MAXSIZE}
      ports:
      - 8089:8334
      volumes:
      - ${DOCKERFOLDER}/filestach/state:/app/data/state # Persistent storage for Filestash data

    wopi_server:
      container_name: filestash_wopi
      image: collabora/code:24.04.10.2.1
      restart: always
      environment:
      - "extra_params=--o:ssl.enable=false"
      - aliasgroup1="https://.*:443"
      command:
      - /bin/bash
      - -c
      - |
          curl -o /usr/share/coolwsd/browser/dist/branding-desktop.css https://gist.githubusercontent.com/mickael-kerjean/bc1f57cd312cf04731d30185cc4e7ba2/raw/d706dcdf23c21441e5af289d871b33defc2770ea/destop.css
          /bin/su -s /bin/bash -c '/start-collabora-online.sh' cool
      user: root
      ports:
      - 9980:9980
  volumes:
      filestash: {}