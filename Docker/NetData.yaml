services:
  netdata:
    image: netdata/netdata:latest  
    container_name: Netdata
    hostname: ${HOSTNAME:?err}  # Optional
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined  # Required on systems with AppArmor; use 'SELinux' equivalent if needed
    environment:
      - PUID=${PUID:?err}    # User ID
      - PGID=${PGID:?err}    # Group ID
      - TZ=${TZ:?err}        # TimeZone
      - UMASK=${UMASK:?err}  # File Umask
      - NETDATA_CLAIM_TOKEN= # Add your Token
      - NETDATA_CLAIM_URL=https://app.netdata.cloud
      - NETDATA_CLAIM_ROOMS= # Added your Room GUI
    volumes:
      - ${DOCKERFOLDER}/netdata/netdataconfig:/etc/netdata
      - ${DOCKERFOLDER}/netdata/netdatalib:/var/lib/netdata
      - ${DOCKERFOLDER}/netdata/netdatacache:/var/cache/netdata
      # Host mounts for full system monitoring
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      # Docker socket for container monitoring (optional but recommended)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE:?err}  # Max number of log files
        max-size: ${DOCKERLOGGING_MAXSIZE:?err}  # Max file size
    # Optional: Health check
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:19999/api/v1/info || exit 1"]
      interval: 2m
      timeout: 20s
      retries: 3
    network_mode: host
    restart: unless-stopped